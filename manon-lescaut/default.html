<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="stylesheet" href="../libretto.css">

<div class="app">

  <div class="context-bar" id="contextBar">
    <div class="context-left" onclick="openIndex()" title="Open index">
      <span class="context-track" id="trackLabel">CD 1 · T1</span>
      <span class="context-sep">&middot;</span>
      <span id="actLabel" style="font-family:var(--sans);font-size:12px;">Acte I</span>
      <span class="context-sep">&middot;</span>
      <span class="context-track-title" id="trackTitle"></span>
      <span class="context-chevron">&#9662;</span>
    </div>
    <div class="context-right">
      <div class="recording-switcher-wrap" id="recSwitcher">
        <button class="recording-switcher" id="recBtn" onclick="toggleSwitcher(event)">
          <span id="recordingLabel">Manon Lescaut · Sinopoli / Freni</span>
          <span class="switcher-chevron">&#9662;</span>
        </button>
        <div class="recording-dropdown" id="recDropdown"></div>
      </div>
      <button class="cast-btn" onclick="openCast()">Cast</button>
    </div>
    <button class="lang-filter-btn" id="mobileBtnIT" onclick="toggleLang('it')">IT</button>
    <button class="lang-filter-btn" id="mobileBtnES" onclick="toggleLang('es')">ES</button>
    <button class="mobile-cast-btn" onclick="openCastSheet()">Cast</button>
  </div>

  <div class="libretto-body">

  </div>
</div>

<div class="bottom-sheet-overlay" id="bottomSheetOverlay" onclick="closeBottomSheet()">
  <div class="bottom-sheet" onclick="event.stopPropagation()">
    <div class="bottom-sheet-handle"></div>
    <div class="drawer-header">
      <span class="drawer-header-title">Index</span>
      <button class="drawer-close" onclick="closeBottomSheet()">&#215;</button>
    </div>
    <div class="sheet-recording-row">
      <span class="sheet-recording-label">Recording</span>
      <div class="sheet-recording-picker" id="sheetRecPicker"></div>
    </div>
    <div class="drawer-body" id="bottomSheetBody"></div>
  </div>
</div>
<div class="bottom-sheet-overlay" id="castSheetOverlay" onclick="closeCastSheet()">
  <div class="bottom-sheet" onclick="event.stopPropagation()">
    <div class="bottom-sheet-handle"></div>
    <div class="drawer-header">
      <span class="drawer-header-title">Cast</span>
      <button class="drawer-close" onclick="closeCastSheet()">&#215;</button>
    </div>
    <div class="drawer-body" id="castSheetBody"></div>
  </div>
</div>
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <span class="drawer-header-title">Index</span>
      <button class="drawer-close" onclick="closeDrawer()">&#215;</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </div>
</div>

<div class="cast-overlay" id="castOverlay" onclick="closeCast()">
  <div class="cast-drawer" onclick="event.stopPropagation()">
    <div class="cast-drawer-header">
      <span class="cast-drawer-title">Cast</span>
      <button class="drawer-close" onclick="closeCast()">&#215;</button>
    </div>
    <div class="cast-drawer-body">
      <table class="cast-table">
        <thead>
          <tr>
            <th>Character</th>
            <th>Singer</th>
          </tr>
        </thead>
        <tbody id="castTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const RECORDINGS = {
  sinopoli_freni: {
    label: "Manon Lescaut \u00b7 Sinopoli / Freni",
    short: "Sinopoli / Freni",
    tracks: [

    ]
  }
};

  const ACT_DISPLAY = {
    "Act I": "Atto I",
    "Act II": "Atto II",
    "Act III": "Atto III",
    "Act IV": "Atto IV"
  };

  const ACT_STARTS = {

  };

  const CHARACTERS = [
    { id: "manon", name: "Manon Lescaut", voice: "Soprano", description: "Hermana de Lescaut" },
    { id: "desgrieux", name: "Des Grieux", voice: "Tenor", description: "Estudiante" },
    { id: "lescaut", name: "Lescaut", voice: "Baritone", description: "Sargento" },
    { id: "geronte", name: "Geronte di Ravoir", voice: "Bass", description: "Tesorero Real" },
    { id: "edmondo", name: "Edmondo", voice: "Tenor", description: "Estudiante" },
    { id: "oste", name: "L'oste", voice: "Bass", description: "Posadero" },
    { id: "maestro", name: "Il maestro di ballo", voice: "Tenor", description: "Maestro de Baile" },
    { id: "voce", name: "Una voce sola", voice: "Mezzo-soprano", description: "M\u00fasico" },
    { id: "sergente", name: "Un sergente degli arcieri", voice: "Bass", description: "Sargento" },
    { id: "lampionaio", name: "Lampionaio", voice: "Tenor", description: "Farolero" },
    { id: "comandante", name: "Un comandante di Marina", voice: "Bass", description: "Comandante" }
  ];

  const CAST = {
    sinopoli_freni: { "manon": "Mirella Freni", "desgrieux": "Pl\u00e1cido Domingo", "lescaut": "Renato Bruson", "geronte": "Kurt Rydl", "edmondo": "Robert Gambill", "voce": "Brigitte Fassbaender", "oste": "George Macpherson", "maestro": "John Fryatt", "sergente": "Handel Thomas", "lampionaio": "Mark Curtis", "comandante": "John Tomlinson" }
  };

  let activeRecording = "sinopoli_freni";
  let currentActiveId = "t1";
  let observer = null;

  function openIndex() {
    if (window.innerWidth <= 600) {
      openBottomSheet();
    } else {
      openDrawer();
    }
  }

  function openDrawer() {
    closeCast();
    buildDrawer();
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function jumpTo(id) {
    closeDrawer();
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    updateActive(id);
  }

  function openCast() {
    closeDrawer();
    buildCast();
    document.getElementById('castOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeCast() {
    document.getElementById('castOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    closeDrawer();
    closeCast();
    closeCastSheet();
  });

  function toggleSwitcher(event) {
    event.stopPropagation();
    const dd = document.getElementById('recDropdown');
    if (!dd) return;
    if (dd.classList.contains('open')) {
      dd.classList.remove('open');
    } else {
      dd.classList.add('open');
      setTimeout(() => document.addEventListener('click', closeSwitcherOnOutside, { once: true }), 0);
    }
  }
  function closeSwitcherOnOutside() {
    const dd = document.getElementById('recDropdown');
    if (dd) dd.classList.remove('open');
  }

  function buildSwitcherDropdown() {
    const dd = document.getElementById('recDropdown');
    if (!dd) return;
    dd.innerHTML = Object.entries(RECORDINGS).map(([key, rec]) =>
      `<div class="recording-option${key === activeRecording ? ' active' : ''}" onclick="switchRecording('${key}')">${rec.label}</div>`
    ).join('');
  }

  function buildDrawer() {
    const rec = RECORDINGS[activeRecording];
    const body = document.getElementById('drawerBody');
    let html = '';
    let lastGroup = null;

    for (const t of rec.tracks) {
      const group = t.cd + '-' + t.act;
      if (group !== lastGroup) {
        html += `<div class="drawer-cd-label">Disc ${t.cd} — ${t.act}</div>`;
        lastGroup = group;
      }
      const isActive = t.id === currentActiveId;
      html += `<div class="drawer-track${isActive ? ' active' : ''}" id="idx-${t.id}" onclick="jumpTo('${t.id}')">
        <span class="drawer-track-num">${t.track}</span>
        <div class="drawer-track-info">
          <span class="drawer-track-title">${t.title}</span>
          <span class="drawer-track-act">${t.act}</span>
        </div>
      </div>`;
    }

    body.innerHTML = html;
  }

  function buildCast() {
    const cast = CAST[activeRecording];
    const tbody = document.getElementById('castTableBody');
    tbody.innerHTML = CHARACTERS.map(ch => {
      const singer = cast[ch.id];
      return `<tr>
        <td>
          <div class="cast-char-name">${ch.name}</div>
          <div class="cast-voice">${ch.voice}</div>
          <div class="cast-description">${ch.description}</div>
        </td>
        <td>
          ${singer
            ? `<div class="cast-singer">${singer}</div>`
            : `<div class="cast-singer empty">—</div>`}
        </td>
      </tr>`;
    }).join('');
  }

  function applyTooltips() {
    const cast = CAST[activeRecording];
    document.querySelectorAll('.character-name.has-tooltip').forEach(el => {
      const id = el.dataset.characterId;
      const ch = CHARACTERS.find(c => c.id === id);
      if (!ch) return;
      const singer = cast[id];
      el.setAttribute('data-tooltip',
        singer ? `${ch.voice}\u2002·\u2002${singer}` : ch.voice
      );
    });
  }

  function updateTrackTags() {
    document.querySelectorAll('.track-tag').forEach(tag => { tag.style.visibility = 'hidden'; });
    const rec = RECORDINGS[activeRecording];
    const seen = new Set();
    for (const t of rec.tracks) {
      if (!t.has_block) continue;
      const suffix = t.id.slice(1);
      if (seen.has(suffix)) continue;
      seen.add(suffix);
      const tc = document.getElementById('tc' + suffix);
      if (!tc) continue;
      const tag = tc.querySelector('.track-tag');
      if (!tag) continue;
      tag.style.visibility = 'visible';
      tag.innerHTML = `<span class="track-tag-cd">CD${t.cd}</span><span class="track-tag-num">${t.track}</span>`;
    }
  }

  function scrollToCurrentAct() {
    const rec = RECORDINGS[activeRecording];
    const track = rec.tracks.find(t => t.id === currentActiveId);
    if (!track) return;
    const startId = ACT_STARTS[track.act];
    if (!startId) return;
    const el = document.getElementById(startId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function switchRecording(key) {
    activeRecording = key;
    const lbl = document.getElementById('recordingLabel');
    if (lbl) lbl.textContent = RECORDINGS[key].label;
    updateTrackTags();
    buildMobileTrackMarkers();
    buildDrawer();
    buildSwitcherDropdown();
    const dd = document.getElementById('recDropdown');
    if (dd) dd.classList.remove('open');
    scrollToCurrentAct();
    updateActive(currentActiveId);
    applyTooltips();
    if (document.getElementById('castOverlay').classList.contains('open')) {
      buildCast();
    }
    if (document.getElementById('castSheetOverlay').classList.contains('open')) {
      buildCastSheet();
    }
  }

  function updateActive(activeId) {
    currentActiveId = activeId;
    const rec = RECORDINGS[activeRecording];
    const t = rec.tracks.find(t => t.id === activeId) || rec.tracks[0];
    if (!t) return;
    const trackLabel = document.getElementById('trackLabel');
    if (trackLabel) trackLabel.textContent = 'CD ' + t.cd + ' · T' + t.track;
    const trackTitle = document.getElementById('trackTitle');
    if (trackTitle) trackTitle.textContent = t.title;
    const actLabel = document.getElementById('actLabel');
    if (actLabel) actLabel.textContent = ACT_DISPLAY[t.act] || t.act;
    document.querySelectorAll('.drawer-track').forEach(el => el.classList.remove('active'));
    const idx = document.getElementById('idx-' + activeId);
    if (idx) idx.classList.add('active');
  }

  function rewireObserver() {
    if (observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) updateActive(e.target.id); });
    }, { rootMargin: '-5% 0px -85% 0px', threshold: 0 });

    const rec = RECORDINGS[activeRecording];
    rec.tracks.forEach(t => {
      const el = document.getElementById(t.id);
      if (el) observer.observe(el);
    });
  }

  const mobileLangState = { it: true, es: true };

  function toggleLang(lang) {
    const langs = Object.keys(mobileLangState);
    const hasOtherOn = langs.some(l => l !== lang && mobileLangState[l]);
    if (mobileLangState[lang] && !hasOtherOn) return;
    mobileLangState[lang] = !mobileLangState[lang];
    applyLangFilter();
  }

  function applyLangFilter() {
    const body = document.querySelector('.libretto-body');
    body.classList.toggle('it-hidden', !mobileLangState.it);
    document.getElementById('mobileBtnIT').classList.toggle('off', !mobileLangState.it);
    body.classList.toggle('es-hidden', !mobileLangState.es);
    document.getElementById('mobileBtnES').classList.toggle('off', !mobileLangState.es);
  }

  function buildMobileTrackMarkers() {
    document.querySelectorAll('.mobile-track-marker').forEach(el => el.remove());
    const rec = RECORDINGS[activeRecording];
    for (const t of rec.tracks) {
      const col = document.getElementById(t.id);
      if (!col) continue;
      const marker = document.createElement('span');
      marker.className = 'mobile-track-marker';
      marker.textContent = '· T' + t.track;
      col.insertBefore(marker, col.firstChild);
    }
  }

  function buildCastSheet() {
    const cast = CAST[activeRecording];
    const body = document.getElementById('castSheetBody');
    body.innerHTML = CHARACTERS.map(ch => {
      const singer = cast[ch.id];
      const singerClass = singer ? 'cast-singer' : 'cast-singer empty';
      const singerText = singer || '—';
      return `<div class="cast-sheet-row">
        <div class="cast-sheet-char">
          <div class="cast-char-name">${ch.name}</div>
          <div class="cast-voice">${ch.voice}</div>
        </div>
        <div class="${singerClass}">${singerText}</div>
      </div>`;
    }).join('');
  }

  function openCastSheet() {
    buildCastSheet();
    document.getElementById('castSheetOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeCastSheet() {
    document.getElementById('castSheetOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function buildSheetRecordingPicker() {
    const picker = document.getElementById('sheetRecPicker');
    if (!picker) return;
    picker.innerHTML = Object.entries(RECORDINGS).map(([key, rec]) =>
      `<button class="sheet-rec-btn${key === activeRecording ? ' active' : ''}" onclick="switchRecordingFromSheet('${key}')">${rec.short}</button>`
    ).join('');
  }

  function switchRecordingFromSheet(key) {
    if (key === activeRecording) return;
    switchRecording(key);
    buildSheetRecordingPicker();
    buildBottomSheetBody();
  }

  function buildBottomSheetBody() {
    const rec = RECORDINGS[activeRecording];
    const body = document.getElementById('bottomSheetBody');
    let html = '';
    let lastGroup = null;
    for (const t of rec.tracks) {
      const group = t.cd + '-' + t.act;
      if (group !== lastGroup) {
        html += `<div class="drawer-cd-label">Disc ${t.cd} — ${t.act}</div>`;
        lastGroup = group;
      }
      const isActive = t.id === currentActiveId;
      html += `<div class="drawer-track${isActive ? ' active' : ''}" onclick="jumpToMobile('${t.id}')">
        <span class="drawer-track-num">${t.track}</span>
        <div class="drawer-track-info">
          <span class="drawer-track-title">${t.title}</span>
          <span class="drawer-track-act">${t.act}</span>
        </div>
      </div>`;
    }
    body.innerHTML = html;
  }

  function buildBottomSheet() {
    buildSheetRecordingPicker();
    buildBottomSheetBody();
  }

  function openBottomSheet() {
    buildBottomSheet();
    document.getElementById('bottomSheetOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeBottomSheet() {
    document.getElementById('bottomSheetOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function jumpToMobile(id) {
    closeBottomSheet();
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    updateActive(id);
  }

  buildSwitcherDropdown();
  buildDrawer();
  rewireObserver();
  updateActive("t1");
  applyTooltips();
  buildMobileTrackMarkers();
</script>
